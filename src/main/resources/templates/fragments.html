<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>dsr</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2D4HTRHLN1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-2D4HTRHLN1');
    </script>
</head>
<body th:data-api-endpoint="${apiEndpoint}">

<!-- Desktop Icon -->
<div class="desktop-icon" onclick="openTerminal()">
    <div class="icon-img">>_</div>
    <div class="icon-label">Terminal</div>
</div>

<!-- Copyright Footer -->
<div class="copyright">
    &copy; 2026 Diego Soria Ruiz. All rights reserved.
</div>

<!-- Terminal Window -->
<div class="container" id="terminal-window">
    <div class="title-bar" id="title-bar">
        <div class="buttons">
            <div class="button close" onclick="closeTerminal()"></div>
            <div class="button minimize" onclick="minimizeTerminal()"></div>
            <div class="button maximize" onclick="maximizeTerminal()"></div>
        </div>
        <div class="window-title">guest@dsr: ~</div>
    </div>
    
    <div class="terminal-content" id="terminal-content">
        <header>
            <span class="prompt">guest@dsr:~$</span> ./welcome.sh
            <nav>
                <ul>
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/about}">About</a></li>
                    <li><a th:href="@{/blog}">Blog</a></li>
                    <li><a th:href="@{/services}">Services</a></li>
                    <li><a th:href="@{/chat}">Talk to me</a></li>
                </ul>
            </nav>
        </header>

        <!-- Content Injection -->
        <div th:replace="${content}">
            <p>Page content goes here...</p>
        </div>
    </div>
</div>

<!-- Dock -->
<div class="dock">
    <div class="dock-item active" onclick="toggleTerminalFromDock()" title="Terminal">
        <div class="dock-icon">>_</div>
    </div>
    <!-- Placeholder for other potential apps -->
    <!-- <div class="dock-item" title="Browser"><div class="dock-icon">🌐</div></div> -->
</div>

<script>
    const terminal = document.getElementById("terminal-window");
    const dockItem = document.querySelector(".dock-item");

    // --- State Management ---
    function saveState() {
        const state = {
            minimized: terminal.classList.contains('minimized'),
            maximized: terminal.classList.contains('maximized'),
            closed: terminal.classList.contains('closed'),
            top: terminal.style.top,
            left: terminal.style.left
        };
        localStorage.setItem('terminalState', JSON.stringify(state));
    }

    function loadState() {
        const saved = localStorage.getItem('terminalState');
        // Prevent animation on initial load
        terminal.style.transition = 'none';
        
        if (saved) {
            const state = JSON.parse(saved);
            
            if (state.top) terminal.style.top = state.top;
            if (state.left) terminal.style.left = state.left;
            
            if (state.minimized) {
                terminal.classList.add('minimized');
                dockItem.classList.remove('active'); // Visually indicate it's not "open" on screen
            } else {
                dockItem.classList.add('active');
            }

            if (state.maximized) terminal.classList.add('maximized');
            if (state.closed) {
                terminal.classList.add('closed');
                dockItem.classList.remove('active');
            }
        } else {
            // Default state
            dockItem.classList.add('active');
            centerWindow();
        }

        // Restore transition after a small delay
        setTimeout(() => {
            terminal.style.transition = '';
        }, 50);
    }
    
    function centerWindow() {
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        // Use offsetWidth/Height if available, otherwise estimate based on CSS (800px width, 80vh height)
        const width = terminal.offsetWidth || Math.min(800, winW * 0.9);
        const height = terminal.offsetHeight || (winH * 0.8);
        
        const left = (winW - width) / 2;
        const top = (winH - height) / 2;
        
        terminal.style.left = left + "px";
        terminal.style.top = top + "px";
    }

    // --- Actions ---
    function minimizeTerminal() {
        terminal.classList.add('minimized');
        dockItem.classList.remove('active');
        saveState();
    }

    function maximizeTerminal() {
        terminal.classList.toggle('maximized');
        saveState();
    }

    function closeTerminal() {
        terminal.classList.add('closed');
        dockItem.classList.remove('active');
        saveState();
    }

    function openTerminal() {
        terminal.classList.remove('closed');
        terminal.classList.remove('minimized');
        dockItem.classList.add('active');
        saveState();
    }

    function toggleTerminalFromDock() {
        if (terminal.classList.contains('closed')) {
            openTerminal();
        } else if (terminal.classList.contains('minimized')) {
            openTerminal();
        } else {
            minimizeTerminal();
        }
    }

    // --- Drag Logic ---
    dragElement(terminal);

    function dragElement(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const titleBar = document.getElementById("title-bar");
        
        if (titleBar) {
            titleBar.onmousedown = dragMouseDown;
        }

        function dragMouseDown(e) {
            // Don't drag if maximized
            if (elmnt.classList.contains('maximized')) return;
            
            // Don't drag if clicking buttons
            if (e.target.classList.contains('button')) return;

            e = e || window.event;
            e.preventDefault();
            
            // Disable transition during drag for smooth movement
            elmnt.style.transition = 'none';

            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            
            // Boundary checks (optional, but good)
            let newTop = elmnt.offsetTop - pos2;
            let newLeft = elmnt.offsetLeft - pos1;
            
            elmnt.style.top = newTop + "px";
            elmnt.style.left = newLeft + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
            
            // Restore transition
            elmnt.style.transition = '';
            
            saveState(); // Save position on drop
        }
    }

    // Initialize
    // Execute loadState immediately if DOM is ready, or on DOMContentLoaded
    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', loadState);
    } else {
        loadState();
    }

</script>
<script th:src="@{/js/terminal.js(v=${#dates.createNow().time})}"></script>

</body>
</html>

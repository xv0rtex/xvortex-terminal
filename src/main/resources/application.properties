spring.application.name=portfolio
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# Custom properties
blog.posts.directory=src/main/resources/posts
app.logs.directory=logs
spring.devtools.restart.additional-paths=src/main/resources/posts,/home/soriaruiz/form
# Enable Ant Path Matching for legacy pattern support (**/*.png)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Prevent JSESSIONID from appearing in URLs (use cookies only)
server.servlet.session.tracking-modes=cookie

# Groq API Configuration
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_SYSTEM_MODEL:}
groq.system.prompt=${GROQ_SYSTEM_PROMPT:}
groq.system.rules=${GROQ_SYSTEM_RULES:REGLAS DE COMPORTAMIENTO: 1. Sé conversacional. 2. Termina con preguntas.}
groq.hack.system.prompt=${GROQ_HACK_SYSTEM_PROMPT:}
groq.classification.prompt=${GROQ_CLASSIFICATION_PROMPT:}

# Database Config
spring.datasource.url=${DB_URL:jdbc:mysql://192.168.1.7:3306/soriaruiz?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Events
events.file.path=src/main/resources/eventos/events.md
